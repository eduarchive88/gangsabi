<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>강사비 및 수당 관리 프로그램</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* 노션 스타일 CSS 변수 */
        :root {
            --bg-color: #ffffff;
            --text-main: #37352f;
            --text-sub: rgba(55, 53, 47, 0.65);
            --border-color: #ededed;
            --hover-bg: #f1f1ef;
            --active-bg: #e1e1e0;
            --primary-color: #2eaadc;
            --tag-bg-blue: rgba(46, 170, 220, 0.15);
            --tag-text-blue: #2eaadc;
            --status-wait-bg: #e3e2e0;
            --status-wait-text: rgba(55, 53, 47, 0.65);
            --status-done-bg: rgba(77, 171, 154, 0.15);
            --status-done-text: #0f7b6c;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, "Apple Color Emoji", Arial, sans-serif, "Segoe UI Emoji", "Segoe UI Symbol";
            background-color: var(--bg-color); color: var(--text-main);
            line-height: 1.5; padding: 40px 20px;
        }

        .container { max-width: 1200px; margin: 0 auto; }

        header { margin-bottom: 30px; border-bottom: 1px solid var(--border-color); }
        h1 { font-size: 28px; font-weight: 700; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        
        .tabs { display: flex; gap: 20px; }
        .tab-btn {
            background: none; border: none; padding: 10px 4px; font-size: 16px;
            color: var(--text-sub); cursor: pointer; border-bottom: 2px solid transparent;
            transition: all 0.2s ease; font-weight: 500;
        }
        .tab-btn:hover { color: var(--text-main); }
        .tab-btn.active { color: var(--text-main); border-bottom-color: var(--text-main); }

        .tab-content { display: none; animation: fadeIn 0.3s ease; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .toolbar { display: flex; justify-content: space-between; margin-bottom: 15px; }
        .filter-group { display: flex; align-items: center; gap: 10px; }
        
        .btn-add, .btn-export, .btn-import {
            border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer;
            font-size: 14px; font-weight: 500; display: flex; align-items: center; gap: 6px;
            transition: background-color 0.2s;
        }
        .btn-add { background-color: var(--primary-color); color: white; }
        .btn-add:hover { background-color: #238ebd; }
        .btn-export, .btn-import { background-color: white; color: var(--text-main); border: 1px solid var(--border-color); }
        .btn-export:hover, .btn-import:hover { background-color: var(--hover-bg); }

        .table-container { overflow-x: visible; border: 1px solid var(--border-color); border-radius: 6px; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th, td { padding: 12px; border-bottom: 1px solid var(--border-color); vertical-align: middle; }
        
        /* 정렬 가능한 헤더 스타일 */
        th.sortable {
            cursor: pointer; user-select: none; transition: background-color 0.2s;
        }
        th.sortable:hover { background-color: var(--active-bg); color: var(--text-main); }
        th { font-weight: normal; color: var(--text-sub); font-size: 14px; white-space: nowrap; background-color: #fafafa; }
        .sort-icon { margin-left: 4px; font-size: 12px; color: #ccc; transition: color 0.2s; }
        th.sortable.active .sort-icon { color: var(--primary-color); }

        tr:last-child td { border-bottom: none; }
        tr:hover td { background-color: var(--hover-bg); }

        input[type="text"], input[type="date"], input[type="number"] {
            width: 100%; border: 1px solid transparent; background: transparent; padding: 6px 8px;
            font-size: 14px; color: var(--text-main); border-radius: 4px; transition: all 0.2s; font-family: inherit;
        }
        input[type="text"]:focus, input[type="date"]:focus {
            outline: none; border-color: var(--primary-color); background-color: white;
            box-shadow: 0 0 0 2px rgba(46, 170, 220, 0.2);
        }

        .notion-select {
            padding: 8px 12px; border: 1px solid var(--border-color); border-radius: 6px;
            font-size: 14px; color: var(--text-main); background-color: white; cursor: pointer; outline: none;
        }

        /* 커스텀 태그 및 드롭다운 */
        .duration-wrapper { position: relative; }
        .tag-input {
            border-radius: 12px; padding: 4px 10px; display: inline-block; width: auto;
            min-width: 80px; text-align: center; border: 1px solid transparent; font-weight: 500;
        }
        
        .duration-dropdown {
            display: none; position: absolute; top: calc(100% + 4px); left: 0;
            background: white; border: 1px solid var(--border-color); border-radius: 6px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.15); z-index: 100; min-width: 160px; max-height: 250px;
            overflow-y: auto; padding: 6px;
        }
        .duration-dropdown.show { display: block; }
        
        .dropdown-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 6px 8px; margin-bottom: 2px; border-radius: 4px; cursor: pointer;
        }
        .dropdown-item:hover { background-color: var(--hover-bg); }
        .dropdown-tag {
            border-radius: 12px; padding: 2px 8px; font-size: 13px; font-weight: 500;
        }
        .btn-del-item {
            background: none; border: none; color: #bbb; cursor: pointer; padding: 4px;
            border-radius: 4px; font-size: 12px; opacity: 0; transition: all 0.2s;
        }
        .dropdown-item:hover .btn-del-item { opacity: 1; }
        .btn-del-item:hover { color: #e03e3e; background-color: rgba(224, 62, 62, 0.1); }

        .status-badge {
            display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px;
            border-radius: 12px; font-size: 13px; font-weight: 500; white-space: nowrap;
        }
        .status-wait { background-color: var(--status-wait-bg); color: var(--status-wait-text); }
        .status-done { background-color: var(--status-done-bg); color: var(--status-done-text); }

        .btn-delete {
            background: none; border: none; color: #999; cursor: pointer; padding: 6px;
            border-radius: 4px; transition: all 0.2s;
        }
        .btn-delete:hover { color: #e03e3e; background-color: rgba(224, 62, 62, 0.1); }

        /* 토스트 및 모달 */
        .toast {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background-color: rgba(50, 50, 50, 0.9); color: white; padding: 12px 24px;
            border-radius: 8px; font-size: 14px; z-index: 1000; opacity: 0; pointer-events: none; transition: opacity 0.3s;
        }
        .toast.show { opacity: 1; }
        
        .modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.4);
            display: none; align-items: center; justify-content: center; z-index: 1000;
        }
        .modal-overlay.show { display: flex; }
        .modal { background: white; padding: 24px; border-radius: 12px; width: 320px; }
        .modal h3 { margin-bottom: 12px; font-size: 18px; }
        .modal p { color: var(--text-sub); margin-bottom: 20px; font-size: 14px; white-space: pre-line; }
        .modal-actions { display: flex; gap: 10px; justify-content: flex-end; }
        .btn-cancel, .btn-confirm { padding: 8px 16px; border-radius: 6px; border: none; cursor: pointer; font-size: 14px; }
        .btn-cancel { background: var(--hover-bg); }
        .btn-confirm { background: var(--primary-color); color: white; }

        /* 통계 대시보드 */
        .dashboard { display: flex; flex-direction: column; gap: 30px; }
        .summary-card { background-color: #fafafa; border: 1px solid var(--border-color); border-radius: 12px; padding: 30px; text-align: center; }
        .summary-title { font-size: 16px; color: var(--text-sub); margin-bottom: 10px; }
        .summary-amount { font-size: 48px; font-weight: 700; color: var(--text-main); }
        .dashboard-grid { display: grid; grid-template-columns: 1fr 2fr; gap: 20px; }
        .card { border: 1px solid var(--border-color); border-radius: 12px; padding: 20px; background-color: white; }
        .card h3 { font-size: 16px; font-weight: 600; margin-bottom: 20px; border-bottom: 1px solid var(--border-color); padding-bottom: 10px; }
        
        .year-list { list-style: none; }
        .year-item {
            display: flex; justify-content: space-between; padding: 12px 16px; margin-bottom: 4px;
            border-radius: 6px; cursor: pointer; transition: background-color 0.2s;
        }
        .year-item:hover { background-color: var(--hover-bg); }
        .year-item.active { background-color: var(--tag-bg-blue); }
        .year-item.active .year-label, .year-item.active .year-value { color: var(--tag-text-blue); font-weight: 700; }
        .year-label { font-weight: 500; }
        .year-value { font-weight: 600; color: var(--text-sub); }

        .col-amount, .col-date { width: 150px; }
        .col-status { width: 120px; text-align: center; }
        .col-action { width: 80px; text-align: center; }
        .empty-state { text-align: center; padding: 40px; color: var(--text-sub); font-style: italic; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1><i class="fa-solid fa-wallet"></i> 강사비 및 수당 관리</h1>
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('manage')">강의 내역 관리</button>
            <button class="tab-btn" onclick="switchTab('stats')">수입 통계</button>
        </div>
    </header>

    <div id="manage-tab" class="tab-content active">
        <div class="toolbar">
            <div class="filter-group">
                <select id="year-filter" class="notion-select" onchange="changeYearFilter(this.value)">
                    <option value="all">전체 연도</option>
                </select>
            </div>
            <div style="display: flex; gap: 10px;">
                <button class="btn-export" onclick="exportCSV()"><i class="fa-solid fa-download"></i> 백업(CSV)</button>
                <label class="btn-import">
                    <i class="fa-solid fa-upload"></i> 복구(CSV)
                    <input type="file" accept=".csv" onchange="importCSV(event)" style="display: none;">
                </label>
                <button class="btn-add" onclick="addLectureRow()"><i class="fa-solid fa-plus"></i> 새 강의 추가</button>
            </div>
        </div>

        <div class="table-container">
            <table id="lecture-table">
                <thead>
                    <tr>
                        <th class="sortable" onclick="handleSort('name')">강의명 <i class="fa-solid fa-sort sort-icon"></i></th>
                        <th class="col-date sortable" onclick="handleSort('date')">강의 날짜 <i class="fa-solid fa-sort sort-icon"></i></th>
                        <th class="col-date sortable" onclick="handleSort('duration')">강의 시간 <i class="fa-solid fa-sort sort-icon"></i></th>
                        <th class="col-amount sortable" onclick="handleSort('amount')">입금 금액 <i class="fa-solid fa-sort sort-icon"></i></th>
                        <th class="col-date sortable" onclick="handleSort('depositDate')">입금 날짜 <i class="fa-solid fa-sort sort-icon"></i></th>
                        <th class="col-status sortable" onclick="handleSort('status')">입금 여부 <i class="fa-solid fa-sort sort-icon"></i></th>
                        <th class="col-action">관리</th>
                    </tr>
                </thead>
                <tbody id="lecture-tbody"></tbody>
            </table>
        </div>
    </div>

    <div id="stats-tab" class="tab-content">
        <div class="dashboard">
            <div class="summary-card">
                <div class="summary-title">총 누적 수입 (입금 완료 기준)</div>
                <div class="summary-amount" id="total-income">₩0</div>
            </div>
            <div class="dashboard-grid">
                <div class="card">
                    <h3>연도별 수입 내역</h3>
                    <ul class="year-list" id="yearly-list"></ul>
                </div>
                <div class="card">
                    <h3 id="chart-title">월별 수입 (입금 완료 기준)</h3>
                    <div style="position: relative; height:300px; width:100%">
                        <canvas id="monthlyChart"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="toast" class="toast">메시지</div>

<div id="import-modal" class="modal-overlay">
    <div class="modal">
        <h3>데이터 복구</h3>
        <p id="import-modal-msg"></p>
        <div class="modal-actions">
            <button class="btn-cancel" onclick="closeModal()">취소</button>
            <button class="btn-confirm" id="btn-import-confirm">복구하기</button>
        </div>
    </div>
</div>

<script>
    // --- 1. 상태 및 초기화 ---
    let lectures = [];
    let chartInstance = null;
    let savedDurations = [];
    let currentFilterYear = 'all';
    let selectedStatYear = 'all';
    
    // 정렬 상태
    let sortConfig = { key: 'date', direction: 'desc' };

    // 완전히 구분되는 10가지 프리셋 컬러 (노션 스타일)
    const presetColors = [
        { bg: 'rgba(46, 170, 220, 0.15)', text: '#2eaadc' }, // Blue
        { bg: 'rgba(224, 62, 62, 0.15)',  text: '#d43636' }, // Red
        { bg: 'rgba(15, 123, 108, 0.15)', text: '#0f7b6c' }, // Green
        { bg: 'rgba(217, 115, 13, 0.15)', text: '#cc6d0c' }, // Orange
        { bg: 'rgba(105, 64, 165, 0.15)', text: '#6940a5' }, // Purple
        { bg: 'rgba(223, 171, 1, 0.15)',  text: '#cca000' }, // Yellow
        { bg: 'rgba(199, 21, 133, 0.15)', text: '#c71585' }, // Pink
        { bg: 'rgba(160, 64, 0, 0.15)',   text: '#a04000' }, // Brown
        { bg: 'rgba(31, 111, 159, 0.15)', text: '#1f6f9f' }, // Dark Blue
        { bg: 'rgba(85, 85, 85, 0.15)',   text: '#555555' }  // Gray
    ];

    let durationColorMap = {}; 
    let colorIndexCounter = 0;

    function init() {
        const storedData = localStorage.getItem('lecturesData');
        if (storedData) lectures = JSON.parse(storedData);
        else {
            lectures = [
                { id: generateId(), name: "기업 신입사원 교육", date: "2024-03-10", duration: "8시간", amount: 1000000, depositDate: "2024-03-15" }
            ];
            saveData();
        }
        initColors();
        initDurations();
        renderTable();
    }

    function generateId() { return Math.random().toString(36).substr(2, 9); }
    function formatCurrency(num) { return !num ? '₩0' : '₩' + num.toLocaleString('ko-KR'); }
    function showToast(msg) {
        const toast = document.getElementById('toast');
        toast.textContent = msg; toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 3000);
    }

    // --- 색상 고정 매핑 로직 ---
    function initColors() {
        const stored = localStorage.getItem('durationColorMap');
        if (stored) {
            const parsed = JSON.parse(stored);
            durationColorMap = parsed.map || {};
            colorIndexCounter = parsed.counter || 0;
        }
    }
    function saveColors() {
        localStorage.setItem('durationColorMap', JSON.stringify({ map: durationColorMap, counter: colorIndexCounter }));
    }
    function getTagStyle(text) {
        if (!text) return { bg: 'var(--hover-bg)', text: 'var(--text-sub)' };
        if (durationColorMap[text] === undefined) {
            durationColorMap[text] = colorIndexCounter % presetColors.length;
            colorIndexCounter++;
            saveColors();
        }
        return presetColors[durationColorMap[text]];
    }

    // --- 동적 강의 시간 (드롭다운) 로직 ---
    function initDurations() {
        const stored = localStorage.getItem('durationsData');
        if (stored) savedDurations = JSON.parse(stored);
        else {
            savedDurations = ['1시간', '2시간', '3시간', '4시간', '8시간'];
            localStorage.setItem('durationsData', JSON.stringify(savedDurations));
        }
    }
    function addCustomDuration(val) {
        if (val && !savedDurations.includes(val)) {
            savedDurations.push(val);
            localStorage.setItem('durationsData', JSON.stringify(savedDurations));
        }
    }
    function deleteCustomDuration(val) {
        savedDurations = savedDurations.filter(d => d !== val);
        localStorage.setItem('durationsData', JSON.stringify(savedDurations));
    }

    // 드롭다운 렌더링
    function getDropdownHTML() {
        if (savedDurations.length === 0) return `<div style="padding:10px; text-align:center; color:#999; font-size:12px;">저장된 시간이 없습니다</div>`;
        return savedDurations.map(d => {
            const style = getTagStyle(d);
            return `
                <div class="dropdown-item" data-value="${d}">
                    <span class="dropdown-tag" style="background-color:${style.bg}; color:${style.text};">${d}</span>
                    <button class="btn-del-item" title="목록에서 삭제"><i class="fa-solid fa-trash"></i></button>
                </div>
            `;
        }).join('');
    }

    // 드롭다운 이벤트 처리 (문서 전역)
    document.addEventListener('focusin', function(e) {
        if (e.target.classList.contains('input-duration')) {
            document.querySelectorAll('.duration-dropdown').forEach(d => d.classList.remove('show'));
            const wrapper = e.target.closest('.duration-wrapper');
            const dropdown = wrapper.querySelector('.duration-dropdown');
            dropdown.innerHTML = getDropdownHTML();
            dropdown.classList.add('show');
        }
    });

    document.addEventListener('mousedown', function(e) {
        const dropdown = e.target.closest('.duration-dropdown');
        if (dropdown) {
            e.preventDefault(); // input 포커스 잃지 않게 방지
            const item = e.target.closest('.dropdown-item');
            if (item) {
                const text = item.dataset.value;
                const isDelete = e.target.closest('.btn-del-item');
                
                if (isDelete) {
                    if(confirm(`'${text}' 항목을 목록에서 영구 삭제하시겠습니까?\n(기존 입력된 강의 내역은 유지됩니다)`)) {
                        deleteCustomDuration(text);
                        dropdown.innerHTML = getDropdownHTML(); // 드롭다운 즉시 리렌더링
                    }
                } else {
                    const input = dropdown.previousElementSibling;
                    input.value = text;
                    input.dispatchEvent(new Event('change', { bubbles: true })); // 저장 트리거
                    dropdown.classList.remove('show');
                }
            }
        } else if (!e.target.classList.contains('input-duration')) {
            document.querySelectorAll('.duration-dropdown').forEach(d => d.classList.remove('show'));
        }
    });

    // --- 정렬 로직 ---
    function handleSort(key) {
        if (sortConfig.key === key) {
            sortConfig.direction = sortConfig.direction === 'asc' ? 'desc' : 'asc';
        } else {
            sortConfig.key = key;
            sortConfig.direction = 'asc';
        }
        updateSortIcons();
        renderTable();
    }

    function updateSortIcons() {
        document.querySelectorAll('th.sortable').forEach(th => {
            th.classList.remove('active');
            th.querySelector('.sort-icon').className = 'fa-solid fa-sort sort-icon';
        });
        
        // 클릭한 컬럼 아이콘 업데이트
        const ths = document.querySelectorAll('th.sortable');
        const keys = ['name', 'date', 'duration', 'amount', 'depositDate', 'status'];
        const index = keys.indexOf(sortConfig.key);
        if(index !== -1) {
            ths[index].classList.add('active');
            ths[index].querySelector('.sort-icon').className = sortConfig.direction === 'asc' 
                ? 'fa-solid fa-sort-up sort-icon' 
                : 'fa-solid fa-sort-down sort-icon';
        }
    }

    function getSortedLectures(data) {
        return [...data].sort((a, b) => {
            // 새로 추가된 빈 강의는 정렬 설정과 무관하게 무조건 최상단 고정
            if (a.isNew && !b.isNew) return -1;
            if (!a.isNew && b.isNew) return 1;

            let valA = a[sortConfig.key] || '';
            let valB = b[sortConfig.key] || '';

            if (sortConfig.key === 'amount') { valA = Number(valA); valB = Number(valB); }
            if (sortConfig.key === 'status') { valA = a.depositDate ? 1 : 0; valB = b.depositDate ? 1 : 0; }

            if (valA < valB) return sortConfig.direction === 'asc' ? -1 : 1;
            if (valA > valB) return sortConfig.direction === 'asc' ? 1 : -1;
            return 0;
        });
    }

    // --- 탭 및 데이터 렌더링 ---
    function switchTab(tabId) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        event.currentTarget.classList.add('active');
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.getElementById(`${tabId}-tab`).classList.add('active');
        if (tabId === 'stats') renderStatistics();
    }

    function saveData() {
        localStorage.setItem('lecturesData', JSON.stringify(lectures));
        renderTable();
    }

    function changeYearFilter(year) { currentFilterYear = year; renderTable(); }

    function renderTable() {
        const select = document.getElementById('year-filter');
        const years = new Set(lectures.map(l => l.date ? l.date.substring(0, 4) : null).filter(Boolean));
        const sortedYears = Array.from(years).sort((a, b) => b - a);
        select.innerHTML = `<option value="all">전체 연도</option>` + sortedYears.map(y => `<option value="${y}" ${y === currentFilterYear ? 'selected' : ''}>${y}년</option>`).join('');

        const tbody = document.getElementById('lecture-tbody');
        tbody.innerHTML = '';

        let filtered = lectures;
        if (currentFilterYear !== 'all') filtered = lectures.filter(l => l.date && l.date.substring(0, 4) === currentFilterYear);
        
        filtered = getSortedLectures(filtered); // 정렬 적용

        if (filtered.length === 0) {
            tbody.innerHTML = `<tr><td colspan="7" class="empty-state">등록된 강의 내역이 없습니다.</td></tr>`;
            return;
        }

        filtered.forEach(lecture => {
            const tr = document.createElement('tr');
            tr.dataset.id = lecture.id;
            const isDone = !!lecture.depositDate;
            const statusHtml = isDone ? `<span class="status-badge status-done"><i class="fa-solid fa-check"></i> 완료</span>` : `<span class="status-badge status-wait">대기</span>`;
            const tagStyle = getTagStyle(lecture.duration);

            tr.innerHTML = `
                <td><input type="text" placeholder="강의명 입력" class="input-name" value="${lecture.name || ''}"></td>
                <td><input type="date" class="input-date" value="${lecture.date || ''}"></td>
                <td>
                    <div class="duration-wrapper">
                        <input type="text" class="tag-input input-duration" placeholder="직접 입력" autocomplete="off" value="${lecture.duration || ''}" style="background-color: ${tagStyle.bg}; color: ${tagStyle.text};">
                        <div class="duration-dropdown"></div>
                    </div>
                </td>
                <td><input type="text" class="currency-input input-amount" placeholder="₩0" value="${formatCurrency(lecture.amount)}"></td>
                <td><input type="date" class="input-deposit-date" value="${lecture.depositDate || ''}"></td>
                <td class="col-status">${statusHtml}</td>
                <td class="col-action"><button class="btn-delete" title="삭제"><i class="fa-solid fa-trash"></i></button></td>
            `;
            tbody.appendChild(tr);
        });
        updateSortIcons();
    }

    function addLectureRow() {
        // isNew: true 플래그를 추가하여 상단 고정 트리거
        lectures.unshift({ id: generateId(), name: "", date: "", duration: "", amount: 0, depositDate: "", isNew: true });
        saveData();
    }

    // Input 이벤트 위임
    document.getElementById('lecture-tbody').addEventListener('input', function(e) {
        const tr = e.target.closest('tr'); if (!tr) return;
        const lecture = lectures.find(l => l.id === tr.dataset.id); if (!lecture) return;

        // 입력을 시작하면 '새 항목' 고정 플래그 해제 (입력 중에는 화면이 튀지 않음)
        if (lecture.isNew) delete lecture.isNew;

        if (e.target.classList.contains('input-amount')) {
            let raw = e.target.value.replace(/[^0-9]/g, '');
            e.target.value = raw ? '₩' + parseInt(raw, 10).toLocaleString('ko-KR') : '';
            lecture.amount = raw ? parseInt(raw, 10) : 0;
            localStorage.setItem('lecturesData', JSON.stringify(lectures));
        }
        if (e.target.classList.contains('input-duration')) {
            const style = getTagStyle(e.target.value);
            e.target.style.backgroundColor = style.bg; e.target.style.color = style.text;
        }
    });

    document.getElementById('lecture-tbody').addEventListener('change', function(e) {
        const tr = e.target.closest('tr'); if (!tr) return;
        const lecture = lectures.find(l => l.id === tr.dataset.id); if (!lecture) return;

        // 드롭다운이나 날짜 선택 등 변경 완료 시에도 플래그 해제
        if (lecture.isNew) delete lecture.isNew;

        if (e.target.classList.contains('input-name')) lecture.name = e.target.value;
        if (e.target.classList.contains('input-date')) { lecture.date = e.target.value; saveData(); return; }
        if (e.target.classList.contains('input-duration')) {
            lecture.duration = e.target.value;
            addCustomDuration(e.target.value);
        }
        if (e.target.classList.contains('input-deposit-date')) { lecture.depositDate = e.target.value; saveData(); return; }
        localStorage.setItem('lecturesData', JSON.stringify(lectures));
    });

    document.getElementById('lecture-tbody').addEventListener('click', function(e) {
        const btn = e.target.closest('.btn-delete');
        if (btn && confirm("정말 삭제하시겠습니까?")) {
            lectures = lectures.filter(l => l.id !== btn.closest('tr').dataset.id);
            saveData();
        }
    });

    // --- 통계 및 CSV 로직 ---
    function renderStatistics() {
        const completed = lectures.filter(l => l.depositDate && l.amount > 0);
        const total = completed.reduce((sum, l) => sum + l.amount, 0);
        document.getElementById('total-income').textContent = formatCurrency(total);

        const yearlyData = {};
        completed.forEach(l => {
            const y = l.depositDate.substring(0, 4);
            yearlyData[y] = (yearlyData[y] || 0) + l.amount;
        });

        const listEl = document.getElementById('yearly-list'); listEl.innerHTML = '';
        const sorted = Object.keys(yearlyData).sort((a, b) => b - a);
        
        listEl.innerHTML += `<li class="year-item ${selectedStatYear === 'all' ? 'active' : ''}" onclick="selectedStatYear='all'; renderStatistics();"><span class="year-label">전체 기간</span><span class="year-value">${formatCurrency(total)}</span></li>`;
        sorted.forEach(y => {
            listEl.innerHTML += `<li class="year-item ${selectedStatYear === y ? 'active' : ''}" onclick="selectedStatYear='${y}'; renderStatistics();"><span class="year-label">${y}년</span><span class="year-value">${formatCurrency(yearlyData[y])}</span></li>`;
        });

        document.getElementById('chart-title').textContent = selectedStatYear === 'all' ? '전체 기간 월별 수입 합계' : `${selectedStatYear}년 월별 수입`;
        const monthly = new Array(12).fill(0);
        completed.forEach(l => {
            const y = l.depositDate.substring(0, 4);
            if (selectedStatYear === 'all' || selectedStatYear === y) {
                monthly[parseInt(l.depositDate.substring(5, 7), 10) - 1] += l.amount;
            }
        });

        if (chartInstance) chartInstance.destroy();
        chartInstance = new Chart(document.getElementById('monthlyChart').getContext('2d'), {
            type: 'bar',
            data: { labels: ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'], datasets: [{ label: '월별 입금액', data: monthly, backgroundColor: 'rgba(46, 170, 220, 0.6)', borderColor: 'rgba(46, 170, 220, 1)', borderWidth: 1, borderRadius: 4 }] },
            options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: true, ticks: { callback: v => '₩' + v.toLocaleString() } } }, plugins: { tooltip: { callbacks: { label: c => '₩' + c.raw.toLocaleString() } }, legend: { display: false } } }
        });
    }

    function exportCSV() {
        if (!lectures.length) return showToast("백업할 데이터가 없습니다.");
        let csv = '\uFEFFID,강의명,강의 날짜,강의 시간,입금 금액,입금 날짜\n';
        lectures.forEach(l => csv += `${l.id},"${(l.name||'').replace(/"/g, '""')}",${l.date||''},${l.duration||''},${l.amount||0},${l.depositDate||''}\n`);
        const link = document.createElement("a");
        link.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv;charset=utf-8;' }));
        link.download = `강의수당백업_${new Date().toISOString().split('T')[0]}.csv`;
        link.click(); showToast("백업 완료!");
    }

    let pendingImport = null;
    function closeModal() { document.getElementById('import-modal').classList.remove('show'); pendingImport = null; }
    
    function importCSV(event) {
        const file = event.target.files[0]; if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            const rows = e.target.result.split('\n').filter(r => r.trim());
            if (rows.length < 2) { showToast("유효한 데이터가 없습니다."); event.target.value = ''; return; }
            
            pendingImport = [];
            for (let i = 1; i < rows.length; i++) {
                const cols = rows[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.trim().replace(/^"|"$/g, '').replace(/""/g, '"'));
                if (cols.length >= 5) pendingImport.push({ id: cols[0] || generateId(), name: cols[1] || '', date: cols[2] || '', duration: cols[3] || '', amount: parseInt(cols[4], 10) || 0, depositDate: cols[5] || '' });
            }
            document.getElementById('import-modal-msg').textContent = `총 ${pendingImport.length}건 복구 시 기존 데이터는 삭제됩니다.`;
            document.getElementById('import-modal').classList.add('show');
            document.getElementById('btn-import-confirm').onclick = () => {
                if (pendingImport) {
                    lectures = pendingImport; saveData();
                    lectures.forEach(l => l.duration && addCustomDuration(l.duration));
                    if (currentFilterYear !== 'all') changeYearFilter('all');
                    showToast("성공적으로 복구되었습니다."); closeModal();
                }
            };
            event.target.value = '';
        };
        reader.readAsText(file, 'utf-8');
    }

    window.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
